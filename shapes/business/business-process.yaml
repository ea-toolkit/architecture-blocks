blockId: business-process
name: Business Process
layer: business
archimate:
  stencil: mxgraph.archimate3.business
  typeAttr: busType
  typeValue: proc
visual:
  fillColor: "#ffff99"
  strokeColor: "#cccc00"
  fontColor: "#000000"
  fontSize: 12
  fontStyle: 0
dimensions:
  width: 120
  height: 60
properties:
  - key: processOwner
    label: Process Owner
    type: string
    default: ""
  - key: automationLevel
    label: Automation Level
    type: enum
    default: manual
    options:
      - manual
      - semi-automated
      - fully-automated
  - key: maturity
    label: Maturity
    type: enum
    default: defined
    options:
      - initial
      - defined
      - managed
      - optimized

blockId: application-component
name: Application Component
layer: application
archimate:
  stencil: mxgraph.archimate3.application
  typeAttr: appType
  typeValue: comp
visual:
  fillColor: "#99ffff"
  strokeColor: "#00cccc"
  fontColor: "#000000"
  fontSize: 12
  fontStyle: 0
dimensions:
  width: 120
  height: 60
properties:
  - key: owner
    label: Owner
    type: string
    default: ""
    description: Team or person responsible for this component
  - key: status
    label: Status
    type: enum
    default: active
    options:
      - active
      - deprecated
      - planned
      - retiring
    description: Current lifecycle status
  - key: criticality
    label: Criticality
    type: enum
    default: medium
    options:
      - low
      - medium
      - high
      - critical
    description: Business criticality level

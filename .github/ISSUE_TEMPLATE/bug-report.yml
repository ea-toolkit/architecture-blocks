name: Bug Report
description: Report an issue with the package or CLI
labels: [bug]
body:
  - type: textarea
    id: bug
    attributes:
      label: Bug
      description: "What's broken?"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: "How to trigger the bug"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      placeholder: "0.1.0"

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      placeholder: "20.x"
